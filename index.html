<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Bantuan Mekanik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #111827;
            --card2: #1a2235;
            --border: #1f2d45;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warn: #f59e0b;
            --text: #f1f5f9;
            --dim: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex;
            align-items: flex-start; justify-content: center;
            padding: 32px 20px 60px;
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(59,130,246,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(239,68,68,0.06) 0%, transparent 55%);
        }
        .wrap { width: 100%; max-width: 480px; animation: fadeUp .5s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:none } }

        /* Header */
        .header { text-align: center; margin-bottom: 28px; }
        .logo {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border-radius: 22px; display: flex; align-items: center;
            justify-content: center; font-size: 30px; margin: 0 auto 18px;
            box-shadow: 0 8px 32px rgba(239,68,68,0.35);
        }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.85rem; font-weight: 800; letter-spacing: -1px; line-height: 1.15; }
        h1 em { color: var(--danger); font-style: normal; }
        .subtitle { margin-top: 8px; color: var(--dim); font-size: 0.88rem; }
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25);
            padding: 5px 14px; border-radius: 999px; font-size: .8rem;
            color: var(--success); margin-top: 12px; font-weight: 600;
        }
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.6s ease infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)} 50%{box-shadow:0 0 0 7px rgba(16,185,129,0)} }

        /* Card */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5); margin-bottom: 20px;
        }
        label {
            display: block; font-size: .76rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: .07em;
            color: var(--dim); margin-bottom: 8px; margin-top: 14px;
        }
        label:first-child { margin-top: 0; }
        .field-group label { margin-top: 0; margin-bottom: 6px; }
        input[type="text"], input[type="tel"], textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        input[type="text"]:focus, input[type="tel"]:focus, textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        input::placeholder, textarea::placeholder { color: var(--dim); }
        textarea { height: 110px; resize: none; display: block; }

        /* Service Type Selector */
        .service-tabs {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 18px;
        }
        .svc-tab {
            padding: 12px 8px; border: 1px solid var(--border);
            border-radius: 14px; background: var(--bg);
            color: var(--dim); font-family: 'DM Sans', sans-serif;
            font-size: .78rem; font-weight: 600; cursor: pointer;
            text-align: center; transition: all .2s; line-height: 1.3;
        }
        .svc-tab .tab-icon { font-size: 20px; display: block; margin-bottom: 5px; }
        .svc-tab:hover { border-color: var(--primary); color: var(--text); }
        .svc-tab.active { background: rgba(59,130,246,.15); border-color: var(--primary); color: var(--primary); }
        .svc-tab.active-tow { background: rgba(245,158,11,.12); border-color: var(--warn); color: var(--warn); }
        .svc-tab.active-repair { background: rgba(59,130,246,.12); border-color: var(--primary); color: var(--primary); }
        .svc-tab.active-modif { background: rgba(16,185,129,.12); border-color: var(--success); color: var(--success); }

        /* Form fields animated */
        .form-fields { display: flex; flex-direction: column; gap: 0; }
        .field-group { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .4s ease, opacity .3s ease; }
        .field-group.show { max-height: 400px; opacity: 1; }
        .field-group label { margin-top: 18px; margin-bottom: 8px; }
        .field-group:first-of-type label { margin-top: 16px; }
        .field-group input { margin-bottom: 0; }
        .field-group textarea { margin-bottom: 0; }

        /* Send button */
        .send-btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
            letter-spacing: 1.5px; cursor: pointer;
            transition: filter .2s, transform .15s; margin-top: 16px;
        }
        .send-btn { margin-top: 20px; }
        .send-btn.tow { background: linear-gradient(135deg, var(--warn), #d97706); color: white; box-shadow: 0 8px 24px rgba(245,158,11,.3); }
        .send-btn.default { background: linear-gradient(135deg, var(--danger), #b91c1c); color: white; box-shadow: 0 8px 24px rgba(239,68,68,.3); }
        .send-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .send-btn:active { transform: scale(.98); }
        .send-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        /* History */
        .section-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .section-hd h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
        .count-badge { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 3px 12px; font-size: .75rem; color: var(--dim); }

        .call-list { display: flex; flex-direction: column; gap: 10px; }
        .call-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 13px 15px;
            display: flex; align-items: flex-start; gap: 12px; animation: fadeUp .3s ease both;
        }
        .call-item.done { opacity: .4; }
        .call-icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; margin-top: 1px; }
        .call-icon.w  { background: rgba(239,68,68,.15); }
        .call-icon.r  { background: rgba(59,130,246,.15); }
        .call-icon.d  { background: rgba(16,185,129,.15); }
        .call-icon.tw { background: rgba(245,158,11,.15); }
        .call-body { flex: 1; min-width: 0; }
        .call-type-badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
        .call-type-badge.tow    { background: rgba(245,158,11,.15); color: var(--warn); }
        .call-type-badge.repair { background: rgba(59,130,246,.15); color: var(--primary); }
        .call-type-badge.modif  { background: rgba(16,185,129,.15); color: var(--success); }
        .call-msg  { font-size: .87rem; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .call-meta { font-size: .73rem; color: var(--dim); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .sdot.w { background: var(--danger); }
        .sdot.r { background: var(--primary); }
        .sdot.d { background: var(--success); }

        .empty { text-align: center; padding: 28px; color: var(--dim); font-size: .87rem; }
        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card2); border: 1px solid var(--border);
            border-radius: 12px; padding: 11px 20px; font-size: .87rem;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="wrap">
    <!-- Header -->
    <div class="header">
        <div class="logo">🔧</div>
        <h1>Auto <em>Juice</em><br>Jaya</h1>
        <p class="subtitle">Pilih layanan dan kirim permintaan ke mekanik</p>
        <div class="badge">
            <div class="pulse"></div>
            <span id="online-count">0</span>&nbsp;Mekanik Online
        </div>
    </div>

    <!-- Form Card -->
    <div class="card">
        <!-- Service type tabs -->
        <label style="margin-top:0;">Jenis Layanan</label>
        <div class="service-tabs">
            <button class="svc-tab" id="tab-repair" onclick="selectService('repair')">
                <span class="tab-icon">🔩</span>Repair / Servis
            </button>
            <button class="svc-tab" id="tab-modif" onclick="selectService('modif')">
                <span class="tab-icon">⚙️</span>Modifikasi
            </button>
            <button class="svc-tab" id="tab-tow" onclick="selectService('tow')">
                <span class="tab-icon">🚛</span>Jasa Tow
            </button>
        </div>

        <!-- Shared: Nama (all services) -->
        <div class="field-group" id="field-nama">
            <label>Nama Anda</label>
            <input type="text" id="input-nama" placeholder="Masukkan nama lengkap...">
        </div>

        <!-- Tow only: No Telpon + Lokasi -->
        <div class="field-group" id="field-telp">
            <label>No. Telepon</label>
            <input type="tel" id="input-telp" placeholder="Contoh: 08123456789...">
        </div>
        <div class="field-group" id="field-lokasi">
            <label>Lokasi Anda</label>
            <input type="text" id="input-lokasi" placeholder="Contoh: Jl. Sudirman No.5, depan Indomaret...">
        </div>

        <!-- Shared: Keterangan/Pesan (all services) -->
        <div class="field-group" id="field-pesan">
            <label id="pesan-label">Detail Masalah</label>
            <textarea id="input-pesan" placeholder="Jelaskan kondisi kendaraan Anda..."></textarea>
        </div>

        <button class="send-btn default" id="broadcast-btn" style="display:none;" onclick="sendRequest()">
            🚨 &nbsp;KIRIM PERMINTAAN
        </button>
    </div>

    <!-- History -->
    <div class="section-hd">
        <h2>Riwayat Permintaan</h2>
        <span class="count-badge" id="call-count">0 permintaan</span>
    </div>
    <div class="call-list" id="call-list">
        <div class="empty">Belum ada permintaan dikirim.</div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBpKmLeUj6XACRQuecJdG0t2AK-BGDyt5w",
    authDomain: "myfrist-22b3e.firebaseapp.com",
    databaseURL: "https://myfrist-22b3e-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "myfrist-22b3e",
    storageBucket: "myfrist-22b3e.firebasestorage.app",
    messagingSenderId: "893072627803",
    appId: "1:893072627803:web:5a6e93cdc36b8867f3877e"
};
const db = getDatabase(initializeApp(firebaseConfig));

onValue(ref(db, 'online_users'), snap => {
    document.getElementById('online-count').textContent =
        snap.exists() ? Object.keys(snap.val()).length : 0;
});

let currentService = null;

window.selectService = (type) => {
    currentService = type;

    ['repair','modif','tow'].forEach(t => {
        document.getElementById('tab-' + t).className = 'svc-tab';
    });
    document.getElementById('tab-' + type).className = 'svc-tab active-' + type;

    // Always show: nama, pesan
    show('field-nama');
    show('field-pesan');

    if (type === 'tow') {
        show('field-telp');
        show('field-lokasi');
        document.getElementById('pesan-label').textContent = 'Keterangan Tambahan';
        document.getElementById('input-pesan').placeholder = 'Contoh: Mesin mati total, perlu ditarik ke bengkel...';
    } else {
        hide('field-telp');
        hide('field-lokasi');
        document.getElementById('pesan-label').textContent = type === 'repair' ? 'Detail Masalah' : 'Detail Modifikasi';
        document.getElementById('input-pesan').placeholder = type === 'repair'
            ? 'Jelaskan kondisi kendaraan dan keluhan Anda...'
            : 'Jelaskan modifikasi yang diinginkan...';
    }

    const btn = document.getElementById('broadcast-btn');
    btn.style.display = 'block';
    btn.className = 'send-btn ' + (type === 'tow' ? 'tow' : 'default');
    const emoji = type === 'tow' ? '🚛' : type === 'repair' ? '🔩' : '⚙️';
    const label = type === 'tow' ? 'PANGGIL TOW TRUCK' : type === 'repair' ? 'KIRIM KE MEKANIK' : 'AJUKAN MODIFIKASI';
    btn.innerHTML = emoji + ' &nbsp;' + label;
};

function show(id) { document.getElementById(id).classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }

window.sendRequest = () => {
    if (!currentService) return;

    const nama  = document.getElementById('input-nama').value.trim();
    const pesan = document.getElementById('input-pesan').value.trim();
    const telp  = document.getElementById('input-telp').value.trim();
    const lokasi = document.getElementById('input-lokasi').value.trim();

    if (!nama)  { showToast('⚠️ Nama wajib diisi!'); document.getElementById('input-nama').focus(); return; }
    if (currentService === 'tow' && !telp)  { showToast('⚠️ No. telepon wajib diisi!'); document.getElementById('input-telp').focus(); return; }
    if (currentService === 'tow' && !lokasi) { showToast('⚠️ Lokasi wajib diisi!'); document.getElementById('input-lokasi').focus(); return; }
    if (!pesan) { showToast('⚠️ Keterangan wajib diisi!'); document.getElementById('input-pesan').focus(); return; }

    const btn = document.getElementById('broadcast-btn');
    btn.disabled = true;
    btn.textContent = '⏳  Mengirim...';

    let msgSummary = '';
    if (currentService === 'tow') {
        msgSummary = `[TOW] ${nama} | 📞 ${telp} | 📍 ${lokasi} | ${pesan}`;
    } else {
        const typeLabel = currentService === 'repair' ? 'REPAIR' : 'MODIF';
        msgSummary = `[${typeLabel}] ${nama} | ${pesan}`;
    }

    const serviceLabels = { repair: 'Repair / Servis', modif: 'Modifikasi', tow: 'Jasa Tow' };

    set(ref(db, 'calls/' + Date.now()), {
        type: currentService,
        typeLabel: serviceLabels[currentService],
        nama,
        telp: telp || '',
        lokasi: lokasi || '',
        message: msgSummary,
        detail: pesan,
        status: 'Waiting',
        responder: '',
        time: new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }),
        timestamp: Date.now()
    }).then(() => {
        showToast('✅ Permintaan terkirim! Mekanik segera merespons.');
        ['input-nama','input-telp','input-lokasi','input-pesan'].forEach(id => {
            document.getElementById(id).value = '';
        });
    }).catch(e => showToast('❌ Gagal: ' + e.message))
      .finally(() => {
          btn.disabled = false;
          window.selectService(currentService); // restore button label
      });
};

onValue(ref(db, 'calls'), snap => {
    const data = snap.val();
    const list = document.getElementById('call-list');
    document.getElementById('call-count').textContent =
        data ? Object.keys(data).length + ' permintaan' : '0 permintaan';

    if (!data) { list.innerHTML = '<div class="empty">Belum ada permintaan dikirim.</div>'; return; }

    const sorted = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);
    list.innerHTML = '';
    sorted.forEach(([, call]) => {
        const isDone = call.status === 'Selesai';
        const isResp = call.status === 'Direspon';
        const icClass = isDone ? 'd' : isResp ? 'r' : (call.type === 'tow' ? 'tw' : 'w');
        const emoji = isDone ? '✅' : isResp ? '🔧' : (call.type === 'tow' ? '🚛' : call.type === 'modif' ? '⚙️' : '🔩');
        let statusTxt = isDone ? 'Selesai' : isResp ? 'Ditangani oleh ' + call.responder : 'Menunggu mekanik...';
        if (isResp && call.progress === 'ontheway') statusTxt = '🛵 Mekanik sedang menuju lokasi Anda';
        if (isResp && call.progress === 'working')  statusTxt = '🔧 Sedang dikerjakan oleh ' + call.responder;
        const typeLbl = call.typeLabel || call.type || 'Umum';
        const typeClass = call.type || 'repair';

        let mainLine = '';
        if (call.type === 'tow') {
            mainLine = `${call.nama || ''} · 📞 ${call.telp || ''} · 📍 ${call.lokasi || ''}`;
        } else {
            mainLine = `${call.nama || ''} · ${call.detail || call.message || ''}`;
        }

        const d = document.createElement('div');
        d.className = 'call-item' + (isDone ? ' done' : '');
        d.innerHTML = `
            <div class="call-icon ${icClass}">${emoji}</div>
            <div class="call-body">
                <span class="call-type-badge ${typeClass}">${typeLbl}</span>
                <div class="call-msg">${mainLine}</div>
                <div class="call-meta">
                    <span class="sdot ${isDone?'d':isResp?'r':'w'}"></span>
                    <span>${statusTxt}</span>
                    <span>· ${call.time}</span>
                </div>
            </div>`;
        list.appendChild(d);
    });
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
