<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Bantuan Mekanik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        /* --- Root Variables --- */
:root {
    --primary: #4172f3;
    --juice-yellow: #facc15; 
    --primary-light: #eff6ff;
    --success: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --bg-body: #f1f5f9;
    --bg-card: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-body);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

/* --- Layout Grid --- */
.wrap {
    display: grid;
    grid-template-columns: 1fr 380px; 
    grid-template-rows: auto 680px; /* Ditambah dikit tingginya biar lega */
    gap: 30px;
    max-width: 1150px;
    width: 100%;
    align-items: start;
}

/* --- Header Section (Center) --- */
.header { 
    grid-column: 1 / span 2;
    text-align: center;
    margin-bottom: 20px;
}

h1 { font-size: 2.2rem; font-weight: 900; color: #0f172a; text-transform: uppercase; }
h1 em { color: var(--juice-yellow); font-style: normal; }

/* Mekanik Online Green Style */
.badge {
    display: inline-flex;
    align-items: center;
    background: #ecfdf5; 
    color: #059669; 
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 800;
    margin-top: 10px;
    border: 1px solid rgba(16, 185, 129, 0.2);
}

.pulse {
    width: 9px; height: 9px;
    background: #10b981; 
    border-radius: 50%;
    margin-right: 8px;
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
    animation: pulse-green 2s infinite;
}

@keyframes pulse-green {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

/* --- Form Card (Kiri) --- */
.card {
    grid-column: 1; 
    grid-row: 2;
    background: var(--bg-card);
    padding: 30px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    height: 100%;
    overflow-y: auto; /* Agar tombol bisa di-scroll kalau layar sempit */
    display: flex;
    flex-direction: column;
}

/* --- Riwayat Section (Kanan) --- */
.section-hd {
    grid-column: 2; 
    grid-row: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    position: relative;
    top: -45px; 
    padding: 0 5px;
}

.call-list {
    grid-column: 2; 
    grid-row: 2;
    background: rgba(255, 255, 255, 0.5);
    border: 2px dashed #cbd5e1;
    border-radius: var(--radius);
    padding: 15px;
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* --- Item Riwayat & Auto-Enter --- */
.call-item {
    background: white;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    gap: 12px;
    border: 1px solid var(--border);
    border-left: 5px solid var(--primary);
}

.call-meta span[style*="font-size:.68rem"] {
    display: block !important; 
    margin-top: 8px;
    padding-top: 5px;
    border-top: 1px solid #f1f5f9;
}

/* --- Form Elements --- */
.service-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.svc-tab {
    background: #fff;
    border: 1px solid var(--border);
    padding: 12px 5px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.75rem;
    text-align: center;
}

.svc-tab.active-repair { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.svc-tab.active-modif { border-color: var(--success); color: var(--success); background: #f0fdf4; }
.svc-tab.active-tow { border-color: var(--warn); color: var(--warn); background: #fffbeb; }

/* Pastikan group input muncul */
.field-group { display: none; }
.field-group.show { display: block; }

input, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #f8fafc;
    margin-bottom: 15px;
    font-family: inherit;
}

/* --- TOMBOL KIRIM (FIXED HIDE ISSUE) --- */
.send-btn {
    display: block !important; /* Memaksa muncul */
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    margin-top: auto; /* Menaruh tombol di paling bawah box */
    min-height: 55px;
}

.send-btn.default { background: #1e293b; color: white; }
.send-btn.tow { background: linear-gradient(135deg, var(--warn), #d97706); color: white; }

/* --- Toast --- */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1e293b;
    color: #fff;
    padding: 16px 24px;
    border-radius: 12px;
    z-index: 9999;
    transform: translateX(150%);
    transition: 0.4s;
    border-left: 5px solid var(--juice-yellow);
}
#toast.show { transform: translateX(0); }

/* --- Responsive --- */
@media (max-width: 1000px) {
    .wrap { grid-template-columns: 1fr; grid-template-rows: auto; }
    .header, .card, .section-hd, .call-list { grid-column: 1; }
    .section-hd { top: 0; margin-top: 20px; }
    .card { height: auto; min-height: 500px; }
    .call-list { height: 400px; }
}
    </style>
</head>
<body>
<div class="wrap">
    <!-- Header -->
    <div class="header">
        <div class="logo">🔧</div>
        <h1>Auto <em>Juice</em><br>Workshop</h1>
        <p class="subtitle">Pilih layanan dan kirim permintaan ke mekanik</p>
        <div class="badge">
            <div class="pulse"></div>
            <span id="online-count">0</span>&nbsp;Mekanik Online
        </div>
    </div>

    <!-- Form Card -->
    <div class="card">
        <!-- Service type tabs -->
        <label style="margin-top:0;">Jenis Layanan</label>
        <div class="service-tabs">
            <button class="svc-tab" id="tab-repair" onclick="selectService('repair')">
                <span class="tab-icon">🔩</span>Repair / Servis
            </button>
            <button class="svc-tab" id="tab-modif" onclick="selectService('modif')">
                <span class="tab-icon">⚙️</span>Modifikasi
            </button>
            <button class="svc-tab" id="tab-tow" onclick="selectService('tow')">
                <span class="tab-icon">🚛</span>Jasa Tow
            </button>
        </div>

        <!-- Shared: Nama (all services) -->
        <div class="field-group" id="field-nama">
            <label>Nama Anda</label>
            <input type="text" id="input-nama" placeholder="Masukkan nama lengkap...">
        </div>

        <!-- Tow only: No Telpon + Lokasi -->
        <div class="field-group" id="field-telp">
            <label>No. Telepon</label>
            <input type="tel" id="input-telp" placeholder="Contoh: 4533212...">
        </div>
        <div class="field-group" id="field-lokasi">
            <label>Lokasi Anda</label>
            <input type="text" id="input-lokasi" placeholder="Contoh: Jl. Hawick, depan PBH...">
        </div>

        <!-- Shared: Keterangan/Pesan (all services) -->
        <div class="field-group" id="field-pesan">
            <label id="pesan-label">Detail Masalah</label>
            <textarea id="input-pesan" placeholder="Jelaskan kondisi kendaraan Anda..."></textarea>
        </div>

        <button class="send-btn default" id="broadcast-btn" style="display:none;" onclick="sendRequest()">
            🚨 &nbsp;KIRIM PERMINTAAN
        </button>
    </div>

    <!-- History -->
    <div class="section-hd">
        <h2>Riwayat Permintaan</h2>
        <span class="count-badge" id="call-count">0 permintaan</span>
    </div>
    <div class="call-list" id="call-list">
        <div class="empty">Belum ada permintaan dikirim.</div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBpKmLeUj6XACRQuecJdG0t2AK-BGDyt5w",
    authDomain: "myfrist-22b3e.firebaseapp.com",
    databaseURL: "https://myfrist-22b3e-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "myfrist-22b3e",
    storageBucket: "myfrist-22b3e.firebasestorage.app",
    messagingSenderId: "893072627803",
    appId: "1:893072627803:web:5a6e93cdc36b8867f3877e"
};
const db = getDatabase(initializeApp(firebaseConfig));

const EXPIRY_MS_IDX = 30 * 60 * 1000; // change here to adjust (e.g. 1 * 60 * 1000)

async function checkAndRemoveExpired() {
    try {
        const snap = await get(ref(db, 'calls'));
        if (!snap.exists()) return;
        const now  = Date.now();
        const data = snap.val();
        Object.entries(data).forEach(([id, call]) => {
            const ts = call.timestamp || parseInt(id);
            if (now - ts >= EXPIRY_MS_IDX) {
                remove(ref(db, `calls/${id}`));
            }
        });
    } catch(e) {}
}

checkAndRemoveExpired();
setInterval(checkAndRemoveExpired, 30 * 1000);

onValue(ref(db, 'online_users'), snap => {
    document.getElementById('online-count').textContent =
        snap.exists() ? Object.keys(snap.val()).length : 0;
});

let currentService = null;

window.selectService = (type) => {
    currentService = type;

    ['repair','modif','tow'].forEach(t => {
        document.getElementById('tab-' + t).className = 'svc-tab';
    });
    document.getElementById('tab-' + type).className = 'svc-tab active-' + type;

    show('field-nama');
    show('field-pesan');

    if (type === 'tow') {
        show('field-telp');
        show('field-lokasi');
        document.getElementById('pesan-label').textContent = 'Keterangan Tambahan';
        document.getElementById('input-pesan').placeholder = 'Contoh: Mesin mati total, perlu ditarik ke bengkel...';
    } else {
        hide('field-telp');
        hide('field-lokasi');
        document.getElementById('pesan-label').textContent = type === 'repair' ? 'Detail Masalah' : 'Detail Modifikasi';
        document.getElementById('input-pesan').placeholder = type === 'repair'
            ? 'Jelaskan kondisi kendaraan dan keluhan Anda...'
            : 'Jelaskan modifikasi yang diinginkan...';
    }

    const btn = document.getElementById('broadcast-btn');
    btn.style.display = 'block';
    btn.className = 'send-btn ' + (type === 'tow' ? 'tow' : 'default');
    const emoji = type === 'tow' ? '🚛' : type === 'repair' ? '🔩' : '⚙️';
    const label = type === 'tow' ? 'PANGGIL TOW TRUCK' : type === 'repair' ? 'KIRIM KE MEKANIK' : 'AJUKAN MODIFIKASI';
    btn.innerHTML = emoji + ' &nbsp;' + label;
};

function show(id) { document.getElementById(id).classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }

window.sendRequest = () => {
    if (!currentService) return;

    const nama  = document.getElementById('input-nama').value.trim();
    const pesan = document.getElementById('input-pesan').value.trim();
    const telp  = document.getElementById('input-telp').value.trim();
    const lokasi = document.getElementById('input-lokasi').value.trim();

    if (!nama)  { showToast('⚠️ Nama wajib diisi!'); document.getElementById('input-nama').focus(); return; }
    if (currentService === 'tow' && !telp)  { showToast('⚠️ No. telepon wajib diisi!'); document.getElementById('input-telp').focus(); return; }
    if (currentService === 'tow' && !lokasi) { showToast('⚠️ Lokasi wajib diisi!'); document.getElementById('input-lokasi').focus(); return; }
    if (!pesan) { showToast('⚠️ Keterangan wajib diisi!'); document.getElementById('input-pesan').focus(); return; }

    const btn = document.getElementById('broadcast-btn');
    btn.disabled = true;
    btn.textContent = '⏳  Mengirim...';

    let msgSummary = '';
    if (currentService === 'tow') {
        msgSummary = `[TOW] ${nama} | 📞 ${telp} | 📍 ${lokasi} | ${pesan}`;
    } else {
        const typeLabel = currentService === 'repair' ? 'REPAIR' : 'MODIF';
        msgSummary = `[${typeLabel}] ${nama} | ${pesan}`;
    }

    const serviceLabels = { repair: 'Repair / Servis', modif: 'Modifikasi', tow: 'Jasa Tow' };

    set(ref(db, 'calls/' + Date.now()), {
        type: currentService,
        typeLabel: serviceLabels[currentService],
        nama,
        telp: telp || '',
        lokasi: lokasi || '',
        message: msgSummary,
        detail: pesan,
        status: 'Waiting',
        responder: '',
        time: new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }),
        timestamp: Date.now()
    }).then(() => {
        showToast('✅ Permintaan terkirim! Mekanik segera merespons.');
        ['input-nama','input-telp','input-lokasi','input-pesan'].forEach(id => {
            document.getElementById(id).value = '';
        });
    }).catch(e => showToast('❌ Gagal: ' + e.message))
      .finally(() => {
          btn.disabled = false;
          window.selectService(currentService);
      });
};

onValue(ref(db, 'calls'), snap => {
    const data = snap.val();
    const list = document.getElementById('call-list');
    document.getElementById('call-count').textContent =
        data ? Object.keys(data).length + ' permintaan' : '0 permintaan';

    if (!data) { list.innerHTML = '<div class="empty">Belum ada permintaan dikirim.</div>'; return; }

    const sorted = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);
    list.innerHTML = '';
    sorted.forEach(([, call]) => {
        const isDone = call.status === 'Selesai';
        const isResp = call.status === 'Direspon';
        const icClass = isDone ? 'd' : isResp ? 'r' : (call.type === 'tow' ? 'tw' : 'w');
        const emoji = isDone ? '✅' : isResp ? '🔧' : (call.type === 'tow' ? '🚛' : call.type === 'modif' ? '⚙️' : '🔩');
        let statusTxt = isDone ? 'Selesai' : isResp ? 'Ditangani oleh ' + call.responder : 'Menunggu mekanik...';
        if (isResp && call.progress === 'ontheway') statusTxt = '🛵 Mekanik sedang menuju lokasi Anda';
        if (isResp && call.progress === 'working')  statusTxt = '🔧 Sedang dikerjakan oleh ' + call.responder;
        const typeLbl = call.typeLabel || call.type || 'Umum';
        const typeClass = call.type || 'repair';

        let mainLine = '';
        if (call.type === 'tow') {
            mainLine = `${call.nama || ''} · 📞 ${call.telp || ''} · 📍 ${call.lokasi || ''}`;
        } else {
            mainLine = `${call.nama || ''} · ${call.detail || call.message || ''}`;
        }

        const EXPIRY_MS   = EXPIRY_MS_IDX;
        const ts          = call.timestamp || 0;
        const msLeft      = EXPIRY_MS - (Date.now() - ts);
        const isExpiring  = msLeft > 0 && msLeft < 5 * 60 * 1000;
        let expiryLine    = '';
        if (!isDone && msLeft > 0) {
            const mLeft = Math.floor(msLeft / 60000);
            expiryLine = `<span style="font-size:.68rem;color:${isExpiring ? '#ef4444' : '#9ca3af'};">⏱ Hapus otomatis dalam ${mLeft} menit</span>`;
        }

        const d = document.createElement('div');
        d.className = 'call-item' + (isDone ? ' done' : '');
        d.innerHTML = `
            <div class="call-icon ${icClass}">${emoji}</div>
            <div class="call-body">
                <span class="call-type-badge ${typeClass}">${typeLbl}</span>
                <div class="call-msg">${mainLine}</div>
                <div class="call-meta">
                    <span class="sdot ${isDone?'d':isResp?'r':'w'}"></span>
                    <span>${statusTxt}</span>
                    <span>· ${call.time}</span>
                    ${expiryLine}
                </div>
            </div>`;
        list.appendChild(d);
    });
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
