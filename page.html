<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alarm-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h1 class="blink">EMERGENCY CALL!</h1>
            <p>Operator memanggil Anda, segera respon!</p>
            <div class="btn-group-vertical">
                <button id="otw-btn" class="btn-otw">🏃 SAYA OTW!</button>
                <button id="stop-alarm-btn" class="btn-stop">MATIKAN ALARM</button>
            </div>
        </div>
    </div>

    <div class="container" id="login-section">
        <div class="card">
            <h2>Pilih Identitas Anda</h2>
            <select id="user-select" class="custom-select">
                <option value="user1">Chloe Lonicera</option>
                <option value="user2">Jackob Bienvenida</option>
                <option value="user3">Dante Moruga</option>
                <option value="user4">Bruno Jaramilo</option>
                <option value="user5">Javier Ortega</option>
                <option value="user6">Zexo Lazarus</option>
            </select>
            <button id="login-btn" class="btn btn-primary">AKTIFKAN STATUS</button>
        </div>
    </div>

    <div class="container hidden" id="status-section">
        <div class="card">
            <div id="status-indicator" class="status-badge online">ONLINE</div>
            <h2 id="display-username">Nama User</h2>
            <p id="status-text">Menunggu instruksi...</p>
            <button id="logout-btn" class="btn btn-secondary">OFFLINE / KELUAR</button>
        </div>
    </div>

    <audio id="alarm-sound" src="alarm.mp3" preload="auto" loop></audio>
    <script type="module" src="script.js"></script>
</body>
</html>
